services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: crypto_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: crypto_kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_EXTERNAL_PORT},PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092

    volumes:
      - kafka_data:/var/lib/kafka/data   


  redis:
    image: redis:7.2-alpine
    container_name: crypto_redis
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data 
  postgres:
    image: postgres:16
    container_name: crypto_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql

  grafana:
    image: grafana/grafana:10.4.2
    container_name: crypto_grafana
    depends_on:
      - postgres
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  api:
    image: python:3.12-slim
    container_name: crypto_api
    working_dir: /app
    volumes:
      - ./api:/app/api
    command: sh -c "pip install -r api/requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${API_PORT}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  producer:
    image: python:3.12-slim
    container_name: crypto_producer
    working_dir: /app
    volumes:
      - ./producer:/app/producer
    command: sh -c "pip install -r producer/requirements.txt && python producer/binance_producer.py"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw_trades
      BINANCE_WS_URL: wss://stream.binance.com:9443/stream?streams=btcusdt@trade/ethusdt@trade/solusdt@trade
    depends_on:
      - kafka
        
  spark-debug:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: crypto_spark_debug
    working_dir: /app
    volumes:
      - ./spark:/app
      - ./checkpoints:/app/checkpoints
    env_file:
      - .env
    command: tail -f /dev/null

  spark-processor:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: crypto_spark_processor
    working_dir: /app
    volumes:
      - ./spark:/app
      - ./checkpoints:/app/checkpoints
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw_trades
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - kafka
      - postgres
      - redis
    command: python /app/stream_processor.py

volumes:
  postgres_data:
  grafana_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  redis_data: